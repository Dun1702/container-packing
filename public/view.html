[<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Packing Pro - Public Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f0e8;--panel:#ffffffea;--ink:#172033;--muted:#5e6778;--line:#1720331a;--primary:#1f6feb;--accent:#f97316}
    *{box-sizing:border-box} body{margin:0;font-family:Manrope,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,#1f6feb22,transparent 32%),radial-gradient(circle at bottom right,#f9731622,transparent 26%),var(--bg)}
    .shell{display:grid;grid-template-columns:minmax(340px,420px) 1fr;gap:18px;min-height:100vh;padding:18px}
    .rail,.stage{background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:0 20px 40px #1720331f}
    .rail{padding:22px;overflow:auto}.stage{position:relative;overflow:hidden;min-height:calc(100vh - 36px)}
    h1,h2,strong{font-family:"Barlow Condensed",sans-serif;letter-spacing:.02em} h1{margin:14px 0 8px;font-size:36px;line-height:.96} h2{margin:0;font-size:24px}
    p{margin:0;color:var(--muted);line-height:1.55}.eyebrow,.meta{font:600 11px "IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:.08em}
    .eyebrow{display:inline-flex;padding:6px 10px;border-radius:999px;background:#1f6feb18;color:var(--primary)} .chips,.grid,.queue,.steps,.cargo,.actions,.kpis{display:flex;flex-wrap:wrap;gap:8px}
    .chips{margin-top:16px}.section{margin-top:22px;padding-top:18px;border-top:1px solid var(--line)} .head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
    .chip,.pill,button{display:inline-flex;align-items:center;border-radius:999px;font-weight:700}
    .chip,.pill{padding:7px 10px;border:1px solid #1f6feb1f;background:#fff;font-size:12px}
    .pill{padding:5px 8px;background:#1720330f;color:var(--muted);font-size:11px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .card,.step{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}.card span{display:block;font:500 11px "IBM Plex Mono",monospace;text-transform:uppercase;color:var(--muted)} .card strong{display:block;margin-top:6px;font-size:20px}
    .queue,.steps,.cargo{flex-direction:column}.item-header{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.item-title{font-size:20px}.small{margin-top:4px;font-size:12px}
    .metrics{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.step{cursor:pointer;transition:.18s}.step.active{border-color:#1f6feb66;box-shadow:0 14px 24px #1f6feb1f;transform:translateY(-1px)}
    .step-index{width:40px;height:40px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;background:#1f6feb18;color:var(--primary);font:700 12px "IBM Plex Mono",monospace}
    button{padding:10px 14px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;transition:.18s} button:hover{transform:translateY(-1px);border-color:#1f6feb66}
    .topbar,.status,.scene-kpi{position:absolute;z-index:2;background:#ffffffe0;border:1px solid var(--line);backdrop-filter:blur(10px)}
    .topbar{left:18px;right:18px;top:18px;display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:18px}.status{right:18px;top:92px;max-width:340px;padding:14px;border-radius:18px;font-size:13px;color:var(--muted)}
    .kpis{position:absolute;left:18px;right:18px;bottom:18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.scene-kpi{position:relative;padding:12px;border-radius:16px}.scene-kpi span{display:block;font:500 10px "IBM Plex Mono",monospace;text-transform:uppercase;color:var(--muted)} .scene-kpi strong{display:block;margin-top:6px;font-size:22px}
    #canvas{position:absolute;inset:0}.empty{color:var(--muted);font-size:13px}
    @media (max-width:1100px){.shell{grid-template-columns:1fr}.stage{min-height:70vh}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:720px){.shell{padding:12px}.grid,.kpis{grid-template-columns:1fr}.topbar{flex-direction:column}.actions button{flex:1}.status{left:18px;max-width:none}}
    @media print{body{background:#fff}.shell{display:block;padding:0}.rail{border:none;box-shadow:none;background:#fff;padding:0}.stage,.actions,.controls{display:none!important}.section{break-inside:avoid}}
  </style>
  <script type="importmap">
    {"imports":{"three":"https://unpkg.com/three@0.158.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.158.0/examples/jsm/"}}
  </script>
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="eyebrow">Public Load Report</div>
      <h1 id="title">Loading...</h1>
      <p id="subtitle">Đang tải dữ liệu chia sẻ...</p>
      <p id="notes" style="margin-top:10px;font-size:13px"></p>
      <div id="hero" class="chips"></div>
      <section class="section"><div class="head"><h2>Shipment Brief</h2><div id="briefMeta" class="meta"></div></div><div id="brief" class="grid"></div></section>
      <section class="section"><div class="head"><h2>Load KPIs</h2><div id="kpiMeta" class="meta"></div></div><div id="kpi" class="grid"></div></section>
      <section class="section"><div class="head"><h2>Priority Groups</h2><div id="queueMeta" class="meta"></div></div><div id="queue" class="queue"></div></section>
      <section class="section"><div class="head"><h2>Rule Engine</h2><div id="ruleMeta" class="meta"></div></div><div id="rules" class="chips"></div></section>
      <section class="section"><div class="head"><h2>Step-By-Step</h2><div id="stepMeta" class="meta"></div></div><div class="controls actions" style="margin-bottom:10px"><button id="prev">Prev</button><button id="play">Play</button><button id="next">Next</button></div><p id="caption" class="small"></p><div id="steps" class="steps"></div></section>
      <section class="section"><div class="head"><h2>Cargo Ledger</h2><div id="cargoMeta" class="meta"></div></div><div id="cargo" class="cargo"></div></section>
    </aside>
    <main class="stage">
      <div class="topbar"><div><strong style="font-size:24px">3D Load Viewer</strong><div id="topMeta" class="meta" style="margin-top:4px;color:var(--muted)"></div></div><div class="actions"><button id="copy">Copy Link</button><button id="print">Print</button></div></div>
      <div id="status" class="status">Đang dựng mô hình 3D...</div>
      <div id="sceneKpi" class="kpis"></div>
      <div id="canvas"></div>
    </main>
  </div>
  <script type="module">
    import * as THREE from 'three'; import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    const COLORS={normal:0x2563eb,fragile:0xef4444,heavy:0x10b981,liquid:0x0891b2}, params=new URLSearchParams(location.search), publicId=params.get('id')||location.pathname.match(/\/p\/([^/?#]+)/)?.[1], printMode=params.get('print')==='1', autoplay=params.get('autoplay')!=='0';
    const state={data:null,steps:[],index:-1,playing:false,timer:null,scene:null,camera:null,renderer:null,controls:null,container:null,cargo:null};
    const $=id=>document.getElementById(id), n=(v,f=0)=>{const x=Number(v);return Number.isFinite(x)?x:f}, r=(v,d=2)=>Math.round(n(v)*10**d)/10**d, s=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    if(!publicId){$('subtitle').textContent='Thiếu public id'; throw new Error('Missing public id');}
    fetch(`/api/share/view/${publicId}`).then(x=>x.json()).then(resp=>{if(!resp.success) throw new Error(resp.message||'Không tìm thấy dữ liệu'); state.data=normalize(resp.data); render(); initScene(); initPlayback(); bind(); if(printMode) setTimeout(()=>print(),600); else if(autoplay&&state.steps.length>1) setTimeout(start,500);}).catch(err=>{$('subtitle').textContent=err.message; $('status').textContent='Viewer không thể dựng dữ liệu'; console.error(err);});
    function normalize(raw){if(raw.shipment&&raw.container?.width){return {...raw,queueGroups:(raw.queueGroups?.length?raw.queueGroups:queueFrom(raw.plannedEntries||[])),activeRules:raw.activeRules||[]};}
      const c=raw.container||{},w=n(c.width||c.dimensions?.width),h=n(c.height||c.dimensions?.height),d=n(c.depth||c.dimensions?.depth),boxes=(raw.boxes||[]).map((b,i)=>({id:b._id||b.id||`box-${i+1}`,name:b.name||`Box ${i+1}`,width:n(b.width),height:n(b.height),depth:n(b.depth),weight:n(b.weight),category:b.category||'normal',destination:b.destination||'',group:b.group||b.destination||'General',priority:n(b.priority,i+1),sku:b.sku||'',position:{x:n(b.position?.x)-w/2+n(b.width)/2,y:n(b.position?.y)+n(b.height)/2,z:n(b.position?.z)-d/2+n(b.depth)/2}}));
      const entries=boxes.map(b=>({name:b.name,quantity:1,width:b.width,height:b.height,depth:b.depth,weight:b.weight,totalWeight:b.weight,totalVolume:r(b.width*b.height*b.depth/1e6,3),destination:b.destination,group:b.group,priority:b.priority,category:b.category,sku:b.sku,source:'placed'}));
      return {shipment:{name:raw.name||'Shared project',ref:raw.publicId||publicId,mode:'project',objective:'balanced',route:'',notes:raw.description||''},container:{name:c.type||'Container',type:c.type||'Container',width:w,height:h,depth:d,maxLoad:n(c.maxLoad),color:0x2563eb,axlePositions:[],axleLimits:[]},rules:{priority:{},weight:{}},activeRules:[],metrics:{stage:boxes.length?4:0,plannedQty:boxes.length,plannedWeight:r(entries.reduce((a,b)=>a+b.totalWeight,0),2),placed:{boxCount:boxes.length,totalWeight:r(entries.reduce((a,b)=>a+b.totalWeight,0),2),volumePercent:r(w*h*d?entries.reduce((a,b)=>a+b.totalVolume,0)*1e6/(w*h*d)*100:0,2),weightPercent:r(c.maxLoad?entries.reduce((a,b)=>a+b.totalWeight,0)/n(c.maxLoad)*100:0,2)},axleHealth:{label:'No axle data',safe:true,maxRatio:0}},queueGroups:queueFrom(entries),plannedEntries:entries,boxes,stepPlan:boxes.map((b,i)=>({...b,id:i+1}))};}
    function queueFrom(entries){const map=new Map(); entries.forEach(e=>{const key=`${n(e.priority,3)}__${e.destination||'Kho chinh'}__${e.group||'General'}`; if(!map.has(key)) map.set(key,{queueKey:key,destination:e.destination||'Kho chinh',group:e.group||e.destination||'General',priority:n(e.priority,3),totalQty:0,totalWeight:0,totalVolume:0,items:[]}); const g=map.get(key); g.totalQty+=n(e.quantity,1); g.totalWeight+=n(e.totalWeight,e.weight); g.totalVolume+=n(e.totalVolume); g.items.push(e);}); return [...map.values()].sort((a,b)=>a.priority-b.priority||a.destination.localeCompare(b.destination));}
    function render(){const d=state.data; $('title').textContent=d.shipment.name||'Untitled shipment'; $('subtitle').textContent=[d.shipment.ref?`Ref ${d.shipment.ref}`:'',d.shipment.route||'',d.shipment.objective?`Objective ${d.shipment.objective}`:''].filter(Boolean).join(' · ')||'Shared load plan'; $('notes').textContent=d.shipment.notes||'Snapshot này lưu queue, rules và sequence tại thời điểm chia sẻ.'; $('hero').innerHTML=[d.container.name,`${d.metrics.plannedQty||d.boxes.length} cargo`,`${r(d.metrics.plannedWeight||d.metrics.placed?.totalWeight,1)} kg`,`${r(d.metrics.placed?.volumePercent,1)}% vol`].map(x=>`<span class="chip">${s(x)}</span>`).join('');
      $('briefMeta').textContent=`${(d.shipment.routeStops||[]).length||d.queueGroups.length} stop(s)`; $('brief').innerHTML=[['Container',`${d.container.name} · ${d.container.width}x${d.container.height}x${d.container.depth} cm`],['Route',d.shipment.route||'Single stop'],['Mode',d.shipment.mode||'export'],['Objective',d.shipment.objective||'balanced']].map(([k,v])=>`<div class="card"><span>${s(k)}</span><strong>${s(v)}</strong></div>`).join('');
      $('kpiMeta').textContent=`stage ${n(d.metrics.stage)+1}`; $('kpi').innerHTML=[['Volume Fill',`${r(d.metrics.placed?.volumePercent,1)}%`],['Weight Fill',`${r(d.metrics.placed?.weightPercent,1)}%`],['Balance Score',`${r(d.metrics.balanceScore,2)}`],['Door Score',`${r(d.metrics.doorScore,2)}`]].map(([k,v])=>`<div class="card"><span>${s(k)}</span><strong>${s(v)}</strong></div>`).join('');
      $('queueMeta').textContent=`${d.queueGroups.length} group(s)`; $('queue').innerHTML=d.queueGroups.length?d.queueGroups.map(g=>`<article class="card"><div class="item-header"><div><strong class="item-title">${s(g.destination||'Kho chinh')}</strong><p class="small">${s(g.group)} · Priority ${g.priority}</p></div><span class="pill">P${g.priority}</span></div><div class="metrics"><span class="pill">${n(g.totalQty)} pcs</span><span class="pill">${r(g.totalWeight,1)} kg</span><span class="pill">${r(g.totalVolume,2)} m3</span></div></article>`).join(''):`<div class="empty">Chưa có group.</div>`;
      $('ruleMeta').textContent=`${(d.activeRules||[]).length} active`; $('rules').innerHTML=(d.activeRules||[]).length?d.activeRules.map(x=>`<span class="chip">${s(x)}</span>`).join(''):`<div class="empty">Không có advanced rules.</div>`;
      const cargo=d.plannedEntries?.length?d.plannedEntries:d.boxes.map(b=>({...b,quantity:1,totalWeight:b.weight,totalVolume:r(b.width*b.height*b.depth/1e6,3)})); $('cargoMeta').textContent=`${cargo.length} item(s)`; $('cargo').innerHTML=cargo.length?cargo.map(i=>`<article class="card"><div class="item-header"><div><strong class="item-title">${s(i.name||'Cargo')}</strong><p class="small">${s(i.destination||'Kho chinh')} · ${s(i.group||'General')} · SKU ${s(i.sku||'N/A')}</p></div><span class="pill">P${n(i.priority,3)}</span></div><div class="metrics"><span class="pill">${n(i.quantity,1)} pcs</span><span class="pill">${n(i.width)}x${n(i.height)}x${n(i.depth)} cm</span><span class="pill">${r(i.totalWeight||i.weight,1)} kg</span></div></article>`).join(''):`<div class="empty">Không có cargo.</div>`;
      $('topMeta').textContent=[d.shipment.route||'Single route',(d.activeRules?.length?`${d.activeRules.length} active rules`:'No advanced rules'),(d.stepPlan?.length?`${d.stepPlan.length} steps`:`${d.boxes.length} placed boxes`)].join(' · ');
      $('sceneKpi').innerHTML=[['Placed Boxes',`${n(d.metrics.placed?.boxCount||d.boxes.length)}`],['Total Weight',`${r(d.metrics.placed?.totalWeight||d.metrics.plannedWeight,1)} kg`],['Axle Health',s(d.metrics.axleHealth?.label||'No data')],['Near Door',`${r(d.metrics.nearDoorPercent,1)}%`]].map(([k,v])=>`<div class="scene-kpi"><span>${s(k)}</span><strong>${v}</strong></div>`).join('');}
    function bind(){$('prev').onclick=()=>{pause(); jump(Math.max(state.index-1,0),true)}; $('next').onclick=()=>{pause(); jump(Math.min(state.index+1,state.steps.length-1),true)}; $('play').onclick=()=>state.playing?pause():(state.index>=state.steps.length-1&&jump(0,true),start()); $('copy').onclick=()=>navigator.clipboard?.writeText(location.href); $('print').onclick=()=>print();}
    function initPlayback(){const d=state.data; state.steps=(d.stepPlan?.length?d.stepPlan:d.boxes).map((x,i)=>({id:x.id||i+1,name:x.name||`Buoc ${i+1}`,destination:x.destination||'',group:x.group||x.destination||'General',priority:n(x.priority,3),sku:x.sku||'',weight:n(x.weight),width:n(x.width),height:n(x.height),depth:n(x.depth),category:x.category||'normal',position:x.position})); $('stepMeta').textContent=`${state.steps.length} step(s)`; $('caption').textContent=state.steps.length?'Click từng bước để xem thứ tự xếp giống step-by-step report.':'Snapshot này chưa có sequence.'; $('steps').innerHTML=state.steps.length?state.steps.map((x,i)=>`<article class="step" data-i="${i}"><div class="item-header"><div style="display:flex;gap:12px;align-items:flex-start"><span class="step-index">${i+1}</span><div><strong class="item-title">${s(x.name)}</strong><p class="small">${s(x.destination||'Kho chinh')} · ${s(x.group||'General')} · ${r(x.weight,1)} kg</p></div></div><span class="pill">P${x.priority}</span></div><div class="metrics"><span class="pill">${x.width}x${x.height}x${x.depth} cm</span><span class="pill">${s(x.sku||'No SKU')}</span></div></article>`).join(''):`<div class="empty">Không có step plan.</div>`; document.querySelectorAll('.step').forEach(el=>el.onclick=()=>jump(n(el.dataset.i),false)); if(state.steps.length) jump(state.steps.length-1,true);}
    function initScene(){const host=$('canvas'),d=state.data; state.scene=new THREE.Scene(); state.scene.background=new THREE.Color(0xf5f2eb); state.camera=new THREE.PerspectiveCamera(42,host.clientWidth/host.clientHeight,.1,1e4); state.camera.position.set(d.container.width*1.2,d.container.height*2.2,d.container.depth*1.2); state.renderer=new THREE.WebGLRenderer({antialias:true}); state.renderer.setPixelRatio(devicePixelRatio||1); state.renderer.setSize(host.clientWidth,host.clientHeight); state.renderer.shadowMap.enabled=true; host.appendChild(state.renderer.domElement); state.controls=new OrbitControls(state.camera,state.renderer.domElement); state.controls.enableDamping=true; state.controls.target.set(0,d.container.height/2,0); state.scene.add(new THREE.AmbientLight(0xffffff,.72)); const key=new THREE.DirectionalLight(0xffffff,1.1); key.position.set(d.container.width,d.container.height*2.3,d.container.depth); key.castShadow=true; state.scene.add(key); const fill=new THREE.DirectionalLight(0xfef3c7,.55); fill.position.set(-d.container.width,d.container.height*1.3,-d.container.depth); state.scene.add(fill); state.container=new THREE.Group(); state.cargo=new THREE.Group(); state.scene.add(state.container,state.cargo); const floor=new THREE.Mesh(new THREE.PlaneGeometry(d.container.width*2.3,d.container.depth*2.3),new THREE.MeshStandardMaterial({color:0xe7e5dd,roughness:.95})); floor.rotation.x=-Math.PI/2; floor.position.y=-.1; floor.receiveShadow=true; state.scene.add(floor); drawContainer(); addEventListener('resize',resize); animate();}
    function drawContainer(){const d=state.data.container,W=d.width,H=d.height,D=d.depth,geo=new THREE.BoxGeometry(W,H,D),body=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:d.color||0x2563eb,transparent:true,opacity:.1,roughness:.45,metalness:.2,side:THREE.DoubleSide})); body.position.set(0,H/2,0); state.container.add(body); const wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0x1d4ed8})); wire.position.copy(body.position); state.container.add(wire); const mat=new THREE.LineBasicMaterial({color:0xaab6c8,transparent:true,opacity:.65}); for(let x=-W/2;x<=W/2;x+=40) state.container.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,.1,-D/2),new THREE.Vector3(x,.1,D/2)]),mat)); for(let z=-D/2;z<=D/2;z+=40) state.container.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-W/2,.1,z),new THREE.Vector3(W/2,.1,z)]),mat)); const doorMat=new THREE.MeshStandardMaterial({color:0xc08457,roughness:.55}); ['left','right'].forEach(side=>{const door=new THREE.Mesh(new THREE.BoxGeometry(16,H-30,6),doorMat); door.position.set(side==='left'?-W/2+16:W/2-16,H/2,D/2+2); state.container.add(door);}); if(state.data.rules?.priority?.splitByWall){const ps=[...new Set((state.data.queueGroups||[]).map(g=>n(g.priority,3)))].sort((a,b)=>a-b); if(ps.length>1){const gap=12,seg=(D-gap*(ps.length-1))/ps.length; let cursor=D/2; [...ps].sort((a,b)=>b-a).forEach((p,i,arr)=>{const maxZ=cursor,minZ=i===arr.length-1?-D/2:maxZ-seg,wall=new THREE.Mesh(new THREE.BoxGeometry(W-12,H-12,Math.max(maxZ-minZ,6)),new THREE.MeshBasicMaterial({color:p>=3?0xf59e0b:0x1d4ed8,transparent:true,opacity:.045})); wall.position.set(0,H/2,(minZ+maxZ)/2); state.container.add(wall); cursor=minZ-gap;});}}}
    function mesh(item,highlight=false){const m=new THREE.Mesh(new THREE.BoxGeometry(item.width,item.height,item.depth),new THREE.MeshStandardMaterial({color:COLORS[item.category]||(item.priority>=3?0xf97316:0x2563eb),roughness:.35,metalness:.08,emissive:new THREE.Color(highlight?0xffffff:0x000000),emissiveIntensity:highlight?0.16:0})); m.castShadow=true; m.receiveShadow=true; m.position.set(n(item.position?.x),n(item.position?.y,item.height/2),n(item.position?.z)); return m}
    function rebuild(i){state.cargo.clear(); const vis=state.steps.length?state.steps.slice(0,i+1):state.data.boxes; vis.forEach((x,idx)=>state.cargo.add(mesh(x,idx===vis.length-1)));}
    function updateSteps(){document.querySelectorAll('.step').forEach(el=>el.classList.toggle('active',n(el.dataset.i)===state.index));}
    function jump(i,caption){if(!state.steps.length) return; state.index=Math.max(0,Math.min(i,state.steps.length-1)); rebuild(state.index); updateSteps(); const cur=state.steps[state.index]; $('status').innerHTML=`<strong style="display:block;color:var(--ink);font-size:24px;margin-bottom:6px">Step ${state.index+1}/${state.steps.length}</strong><div><strong>${s(cur.name)}</strong> · ${s(cur.destination||'Kho chinh')} · ${s(cur.group||'General')}</div><div>Priority P${cur.priority} · ${r(cur.weight,1)} kg · ${cur.width}x${cur.height}x${cur.depth} cm</div>`; if(caption) $('caption').textContent=`Đang hiển thị bước ${state.index+1} trên tổng ${state.steps.length} bước.`;}
    function start(){if(state.steps.length<=1||state.playing) return; state.playing=true; $('play').textContent='Pause'; state.timer=setInterval(()=>{if(state.index>=state.steps.length-1){pause(); return;} jump(state.index+1,true);},1200)}
    function pause(){state.playing=false; $('play').textContent='Play'; if(state.timer){clearInterval(state.timer); state.timer=null;}}
    function resize(){const host=$('canvas'); if(!host||!state.renderer||!state.camera) return; state.camera.aspect=host.clientWidth/host.clientHeight; state.camera.updateProjectionMatrix(); state.renderer.setSize(host.clientWidth,host.clientHeight);}
    function animate(){requestAnimationFrame(animate); state.controls?.update(); state.renderer?.render(state.scene,state.camera);}
  </script>
</body>
</html>
