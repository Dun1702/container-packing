<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem trước Excel - Container Packing Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #0f172a;
            padding: 0;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        .header { 
            background: white; 
            padding: 28px 32px; 
            border-radius: 20px 20px 0 0; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 0;
        }
        .header-left h1 { font-size: 28px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
        .header-left p { color: #64748b; font-size: 16px; }
        .header-right { display: flex; gap: 16px; }
        .btn { 
            padding: 14px 28px; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            border: none; 
            transition: all 0.2s ease; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            text-decoration: none;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(59,130,246,0.4); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(16,185,129,0.4); }
        .btn-secondary { background: #f8fafc; color: #475569; border: 2px solid #e2e8f0; }
        .btn-secondary:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .stats-row { display: flex; gap: 24px; margin: 24px 0; flex-wrap: wrap; }
        .stat-card { 
            flex: 1; 
            min-width: 180px; 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            text-align: center; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .stat-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.8; }
        .stat-value { font-size: 28px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
        .stat-label { color: #64748b; font-size: 14px; font-weight: 500; }
        .grid-container { 
            background: white; 
            border-radius: 0 0 20px 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            overflow: hidden;
            max-height: 70vh;
            overflow-y: auto;
        }
        .grid-header { 
            background: linear-gradient(135deg, #f8fafc, #f1f5f9); 
            padding: 24px 32px; 
            display: grid; 
            grid-template-columns: 160px 180px 80px 80px 80px 100px 120px 120px 100px 80px 100px; 
            gap: 16px; 
            align-items: center;
            position: sticky; top: 0; z-index: 10;
            border-bottom: 2px solid #e2e8f0;
        }
        .grid-header span { 
            font-weight: 600; 
            color: #374151; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .grid-row { 
            padding: 20px 32px; 
            display: grid; 
            grid-template-columns: 160px 180px 80px 80px 80px 100px 120px 120px 100px 80px 100px; 
            gap: 16px; 
            align-items: center;
            border-bottom: 1px solid #f8fafc;
            transition: all 0.2s ease;
        }
        .grid-row:hover { background: #f8fafc; }
        .grid-row.selected { background: #dbeafe; }
        .cell-input { 
            padding: 10px 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 14px; 
            width: 100%; 
            transition: all 0.2s ease;
        }
        .cell-input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .cell-badge { 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
            text-align: center;
        }
        .priority-p1 { background: #fef3c7; color: #92400e; }
        .priority-p2 { background: #fed7aa; color: #c2410c; }
        .priority-p3 { background: #fed7aa; color: #c2410c; }
        .priority-p4 { background: #dbeafe; color: #1e40af; }
        .fragile { background: #fee2e2; color: #dc2626; }
        .heavy { background: #dcfce7; color: #166534; }
        .qty-controls { display: flex; gap: 8px; align-items: center; }
        .qty-btn { 
            width: 32px; 
            height: 32px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
        }
        .qty-btn.plus { background: #10b981; color: white; }
        .qty-btn.minus { background: #ef4444; color: white; }
        .total-col { font-weight: 700; color: #1f2937; background: #f8fafc; }
        .warning { color: #ea580c; }
        .error { color: #dc2626; }
        @media (max-width: 1200px) {
            .grid-header, .grid-row { 
                grid-template-columns: repeat(5, 1fr) 100px; 
                gap: 12px;
            }
        }
        .progress-bar { 
            height: 6px; 
            background: #e2e8f0; 
            border-radius: 3px; 
            overflow: hidden; 
            margin: 8px 0;
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #10b981, #059669); 
            transition: width 0.3s ease;
        }
        .notification { 
            position: fixed; 
            top: 24px; 
            right: 24px; 
            padding: 16px 24px; 
            border-radius: 12px; 
            color: white; 
            font-weight: 600; 
            transform: translateX(400px); 
            transition: all 0.3s ease; 
            z-index: 1000; 
            max-width: 400px;
        }
        .notification.show { transform: translateX(0); }
        .notification.success { background: linear-gradient(135deg, #10b981, #059669); }
        .notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .notification.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>Xem trước Excel Import</h1>
                <p id="fileInfo">Đã tải <strong id="sheetCount">0</strong> sheet, <strong id="rowCount">0</strong> dòng dữ liệu</p>
            </div>
            <div class="header-right">
                <a href="#" class="btn btn-secondary" onclick="backToShipments()">← Quay lại</a>
                <button class="btn btn-success" onclick="confirmImport()">✅ Áp dụng vào Load Desk</button>
                <button class="btn btn-primary" onclick="smartPackPreview()">🤖 Xếp thử thông minh</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="statItems">0</div>
                <div class="stat-label">Mặt hàng</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚖️</div>
                <div class="stat-value" id="statWeight">0 kg</div>
                <div class="stat-label">Tổng trọng lượng</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📏</div>
                <div class="stat-value" id="statVolume">0 m³</div>
                <div class="stat-label">Thể tích</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="statGroups">0</div>
                <div class="stat-label">Nhóm queue</div>
            </div>
        </div>

        <div class="grid-container">
            <div class="grid-header">
                <span>Tên hàng</span>
                <span>Mô tả/SKU</span>
                <span>Dài</span>
                <span>Rộng</span>
                <span>Cao</span>
                <span>Trọng lượng</span>
                <span>Số lượng</span>
                <span>Điểm đến</span>
                <span>Ưu tiên</span>
                <span>Loại</span>
                <span>Thao tác</span>
            </div>
            <div id="excelGrid"></div>
        </div>
    </div>

    <script>
        let excelData = [];
        let parsedItems = [];

        // Column mapping (flexible)
        const COLUMN_MAP = {
            'tên': 'name',
            'ten': 'name',
            'tên hàng': 'name',
            'hàng': 'name',
            'mặt hàng': 'name',
            'mã': 'sku',
            'sku': 'sku',
            'lô': 'sku',
            'dài': 'length',
            'd': 'length',
            'depth': 'length',
            'rộng': 'width',
            'r': 'width',
            'w': 'width',
            'cao': 'height',
            'c': 'height',
            'h': 'height',
            'trọng lượng': 'weight',
            'kg': 'weight',
            'weight': 'weight',
            'sl': 'quantity',
            'số lượng': 'quantity',
            'qty': 'quantity',
            'điểm đến': 'destination',
            'đến': 'destination',
            'đích': 'destination',
            'địa điểm': 'destination',
            'ưu tiên': 'priority',
            'p': 'priority',
            'priority': 'priority',
            'loại': 'category',
            'type': 'category'
        };

        function backToShipments() {
            window.location.href = 'shipments.html';
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function updateStats() {
            const totalItems = parsedItems.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const totalWeight = parsedItems.reduce((sum, item) => sum + ((item.weight || 0) * (item.quantity || 1)), 0);
            const totalVolume = parsedItems.reduce((sum, item) => {
                const vol = ((item.length || 0) * (item.width || 0) * (item.height || 0)) / 1000000 * (item.quantity || 1);
                return sum + vol;
            }, 0);
            const groups = [...new Set(parsedItems.map(item => `${item.priority || 3}_${item.destination || 'Chính'}`))].length;

            document.getElementById('statItems').textContent = totalItems;
            document.getElementById('statWeight').textContent = Math.round(totalWeight).toLocaleString() + ' kg';
            document.getElementById('statVolume').textContent = totalVolume.toFixed(2) + ' m³';
            document.getElementById('statGroups').textContent = groups;
        }

        async function processExcel(file) {
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                excelData = json;
                parsedItems = parseExcelRows(json);
                renderGrid();
                updateStats();
                
                document.getElementById('fileInfo').textContent = `Đã parse ${excelData.length} dòng từ sheet "${workbook.SheetNames[0]}"`;
                document.getElementById('sheetCount').textContent = workbook.SheetNames.length;
                document.getElementById('rowCount').textContent = json.length;
                
                showNotification('✅ Excel đã được parse thành công!', 'success');
            } catch (error) {
                showNotification('❌ Lỗi parse Excel: ' + error.message, 'error');
            }
        }

        function parseExcelRows(rows) {
            const headers = rows[0] || [];
            const items = [];
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const item = {};
                
                headers.forEach((header, colIndex) => {
                    const cellValue = row[colIndex];
                    if (!cellValue) return;
                    
                    const normalizedHeader = header.toString().toLowerCase().trim();
                    const mappedField = COLUMN_MAP[normalizedHeader];
                    
                    if (mappedField) {
                        item[mappedField] = parseValue(cellValue, mappedField);
                    }
                });
                
                // Default values
                if (!item.name) item.name = `Hàng ${i}`;
                if (!item.length) item.length = 80;
                if (!item.width) item.width = 60;
                if (!item.height) item.height = 50;
                if (!item.weight) item.weight = 20;
                if (!item.quantity) item.quantity = 1;
                if (!item.priority) item.priority = 3;
                if (!item.destination) item.destination = 'Điểm chính';
                if (!item.category) item.category = 'normal';
                
                items.push(item);
            }
            
            return items;
        }

        function parseValue(value, field) {
            const strValue = String(value).trim();
            
            if (['length', 'width', 'height', 'weight', 'quantity'].includes(field)) {
                const num = parseFloat(strValue.replace(/[^\d.,]/g, '').replace(',', '.'));
                return isNaN(num) ? 0 : num;
            }
            
            if (field === 'priority') {
                const pMatch = strValue.match(/p(\d+)/i);
                return pMatch ? parseInt(pMatch[1]) : 3;
            }
            
            return strValue;
        }

        function renderGrid() {
            const grid = document.getElementById('excelGrid');
            if (!parsedItems.length) {
                grid.innerHTML = '<div style="padding:60px;text-align:center;color:#64748b"><div style="font-size:48px;margin-bottom:16px">📊</div><h3>Không tìm thấy dữ liệu</h3><p>Kiểm tra file Excel có đúng format không</p></div>';
                return;
            }
            
            grid.innerHTML = parsedItems.map((item, index) => `
                <div class="grid-row" data-index="${index}">
                    <input class="cell-input" value="${item.name}" onchange="updateItem(${index}, 'name', this.value)">
                    <input class="cell-input" value="${item.sku || ''}" onchange="updateItem(${index}, 'sku', this.value)" style="font-family:monospace">
                    <input class="cell-input" type="number" value="${item.length}" onchange="updateItem(${index}, 'length', this.value)" min="1">
                    <input class="cell-input" type="number" value="${item.width}" onchange="updateItem(${index}, 'width', this.value)" min="1">
                    <input class="cell-input" type="number" value="${item.height}" onchange="updateItem(${index}, 'height', this.value)" min="1">
                    <input class="cell-input" type="number" value="${item.weight}" onchange="updateItem(${index}, 'weight', this.value)" min="0" step="0.1">
                    <div class="qty-controls">
                        <button class="qty-btn minus" onclick="adjustQty(${index}, -1)">−</button>
                        <span style="font-weight:600;min-width:32px;text-align:center">${item.quantity}</span>
                        <button class="qty-btn plus" onclick="adjustQty(${index}, 1)">+</button>
                    </div>
                    <input class="cell-input" value="${item.destination}" onchange="updateItem(${index}, 'destination', this.value)">
                    <div class="cell-badge priority-p${item.priority}">${item.priority || 3}</div>
                    <div class="cell-badge ${item.category === 'fragile' ? 'fragile' : item.category === 'heavy' ? 'heavy' : ''}">${item.category || 'normal'}</div>
                    <div>
                        <label style="display:block;margin-bottom:4px;font-size:12px">Tổng:</label>
                        <div style="font-weight:600;font-size:14px;color:#059669">
                            ${(item.weight * item.quantity).toFixed(1)}kg<br>
                            ${((item.length * item.width * item.height * item.quantity)/1000000).toFixed(3)}m³
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateItem(index, field, value) {
            parsedItems[index][field] = value;
            updateStats();
            highlightRow(index);
        }

        function adjustQty(index, delta) {
            parsedItems[index].quantity = Math.max(1, (parsedItems[index].quantity || 1) + delta);
            renderGrid();
            updateStats();
        }

        function highlightRow(index) {
            document.querySelectorAll('.grid-row').forEach(row => row.classList.remove('selected'));
            document.querySelector(`[data-index="${index}"]`).classList.add('selected');
            updateStats();
        }

        function confirmImport() {
            // Save to localStorage and redirect to main app
            localStorage.setItem('excelImportData', JSON.stringify(parsedItems));
            showNotification('✅ Đã lưu dữ liệu vào Load Desk!', 'success');
            setTimeout(() => {
                window.location.href = 'index.html#excel-import';
            }, 1000);
        }

        function smartPackPreview() {
            showNotification('🤖 Đang mô phỏng xếp thông minh... (Demo)', 'info');
            // Simulate AI preview
        }

        // File drop handler
        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.body;
            
            ['dragenter', 'dragover'].forEach(event => {
                dropZone.addEventListener(event, e => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.style.background = 'linear-gradient(135deg, #e0f2fe, #bae6fd)';
                });
            });
            
            ['dragleave', 'drop'].forEach(event => {
                dropZone.addEventListener(event, e => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.style.background = '';
                    if (event === 'drop') {
                        const files = e.dataTransfer.files;
                        if (files.length > 0 && files[0].name.match(/\.(xlsx|xls)$/i)) {
                            processExcel(files[0]);
                        }
                    }
                });
            });
        });

        // Auto-load from localStorage if available
        const savedData = localStorage.getItem('excelImportData');
        if (savedData) {
            parsedItems = JSON.parse(savedData);
            renderGrid();
            updateStats();
        }
    </script>
</body>
</html>
